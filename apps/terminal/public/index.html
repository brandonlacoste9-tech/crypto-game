<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether-War Command — DeFAI Autonomous World</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: #0A0E14; color: #e2e8f0; }
    .card { background: rgba(10,14,20,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 16px; }
    .gold-btn { background: linear-gradient(135deg, #FFD700, #FFA500); color: #0A0E14; border: none; border-radius: 12px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    
    // ── Icons as SVG ──────────────────────────────────────────────────
    const icons = {
      Target: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      HardHat: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 17v-3a10 10 0 0 1 20 0v3"/><path d="M12 17v4"/></svg>,
      Handshake: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 17a1 1 0 0 1-1-1V9a1 1 0 0 1 2 0v7Zm-3-3a1 1 0 0 1 1 1v5a1 1 0 0 1-2 0v-5Zm10-4a1 1 0 0 1 1 1v4a1 1 0 0 1-2 0v-4Zm-3-1a1 1 0 0 1 1 1v5a1 1 0 0 1-2 0v-5Z"/></svg>,
      PiggyBank: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7h-1a6 6 0 1 0 0 12h1"/><path d="M12 22v-4"/><path d="M8 12h.01"/><path d="M16 12h.01"/></svg>,
      Cpu: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></svg>,
      Play: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>,
      Activity: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    };

    const AGENTS = [
      { key: "scout", name: "Scout", icon: icons.Target, color: "#06b6d4" },
      { key: "builder", name: "Builder", icon: icons.HardHat, color: "#10b981" },
      { key: "closer", name: "Closer", icon: icons.Handshake, color: "#FFD700" },
      { key: "treasurer", name: "Treasurer", icon: icons.PiggyBank, color: "#f59e0b" },
    ];

    function WarRoom() {
      const [tick, setTick] = useState(0);
      const [logs, setLogs] = useState([]);
      const [running, setRunning] = useState(false);

      const runTick = () => {
        setRunning(true);
        setTick(t => t + 1);

        const actions = [
          { agent: "scout", text: "Scout scanning Sector Grid... Sector 47 detected — yield E:15 C:2.5 D:0.15. Unclaimed. Recommend claim.", confidence: 85 },
          { agent: "builder", text: "Builder checking infrastructure... Sector 12 at level 3. Upgrade cost: 30 Compute. AFFORDABLE.", confidence: 90 },
          { agent: "closer", text: "Closer evaluating market... Portfolio E:142.3 C:18.7 D:1.2. Balanced. Holding.", confidence: 60 },
          { agent: "treasurer", text: "Treasurer reviewing vault... 1,847 total value. Decay manageable. 3 sectors owned. Diversification: medium.", confidence: 75 },
        ];

        const newLogs = actions.map(a => 
          `[T+${tick + 1}] [${a.agent.toUpperCase()}] ${a.text} (${a.confidence}%)`
        );
        setLogs(prev => [...newLogs, ...prev].slice(0, 50));

        setTimeout(() => setRunning(false), 1200);
      };

      useEffect(() => {
        runTick();
        const interval = setInterval(runTick, 8000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div style={{ minHeight: "100vh", padding: "24px", background: "linear-gradient(180deg, #0A0E14 0%, #111827 100%)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 40, height: 40, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05))", border: "1px solid rgba(255,215,0,0.2)", color: "#FFD700" }}>
                {icons.Cpu()}
              </div>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 700, color: "#fff" }}>Aether-War Command</h1>
                <p style={{ fontSize: 11, color: "#94a3b8" }}>Tick #{tick} · 10 Swarms · Sector Grid 10×10 · ERC-6551 + ERC-7521</p>
              </div>
            </div>
            <button onClick={runTick} disabled={running} className="gold-btn" style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {icons.Play()} {running ? "Processing..." : "Process Tick"}
            </button>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 12, marginBottom: 24 }}>
            {AGENTS.map((agent, i) => (
              <div key={agent.key} className="card">
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: `${agent.color}15`, color: agent.color }}>
                    <agent.icon />
                  </div>
                  <div>
                    <h3 style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>{agent.name}</h3>
                    <p style={{ fontSize: 9, color: "#64748b" }}>{["The Oracle", "Infrastructure", "Negotiator", "Risk Manager"][i]}</p>
                  </div>
                </div>
                <p style={{ fontSize: 10, color: "#cbd5e1", lineHeight: 1.5 }}>
                  {logs.find(l => l.includes(`[${agent.key.toUpperCase()}]`))?.split("] ").slice(2).join("] ") || "Awaiting tick..."}
                </p>
              </div>
            ))}
          </div>

          <div className="card" style={{ background: "rgba(10,14,20,0.95)" }}>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 8 }}>
              {icons.Activity()}
              <h3 style={{ fontSize: 12, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: 1 }}>Live Telemetry Stream</h3>
            </div>
            <div style={{ padding: 16, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, lineHeight: 1.8, maxHeight: 360, overflowY: "auto", background: "rgba(0,0,0,0.3)" }}>
              {logs.map((line, i) => (
                <div key={i} style={{ color: "#cbd5e1" }}>{line}</div>
              ))}
              {logs.length === 0 && <p style={{ color: "#475569" }}>No telemetry yet — process a tick to begin.</p>}
            </div>
          </div>

          <div style={{ textAlign: "center", padding: "24px 0 0", fontSize: 10, color: "#475569" }}>
            Aether-War v0.1 · DeFAI Autonomous World · Settlement Layer (ERC-6551/7521) · Physics Engine (ECS) · Agentic Loop active
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WarRoom />);
  </script>
</body>
</html>
