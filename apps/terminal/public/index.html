<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether-War Command — DeFAI Autonomous World</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: #0A0E14; color: #e2e8f0; }
    .card { background: rgba(10,14,20,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 16px; }
    .gold-btn { background: linear-gradient(135deg, #FFD700, #FFA500); color: #0A0E14; border: none; border-radius: 12px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: inherit; }
    .gold-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; color: #fff; font-family: inherit; font-size: 12px; width: 100%; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Icons ─────────────────────────────────────────────────────────
    const I = {
      Target: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      HardHat: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 17v-3a10 10 0 0120 0v3"/><path d="M12 17v4"/></svg>,
      Handshake: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 17a1 1 0 01-1-1V9a1 1 0 012 0v7Zm-3-3a1 1 0 011 1v5a1 1 0 01-2 0v-5Zm10-4a1 1 0 011 1v4a1 1 0 01-2 0v-4Zm-3-1a1 1 0 011 1v5a1 1 0 01-2 0v-5Z"/></svg>,
      PiggyBank: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7h-1a6 6 0 100 12h1"/><path d="M12 22v-4"/><path d="M8 12h.01"/><path d="M16 12h.01"/></svg>,
      Cpu: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></svg>,
      Play: () => <svg w="14" h="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>,
      Activity: () => <svg w="14" h="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
      Wallet: () => <svg w="16" h="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7V4a1 1 0 00-1-1H5a2 2 0 000 4h14a1 1 0 011 1v4a1 1 0 01-1 1H5a2 2 0 000 4h14a1 1 0 001-1v-1"/></svg>,
      Circle: ({ color }) => <div style={{ width:8, height:8, borderRadius:"50%", background:color, boxShadow:`0 0 8px ${color}` }} />,
    };

    const AGENTS = [
      { key: "scout", name: "Scout", title: "The Oracle", icon: I.Target, color: "#06b6d4" },
      { key: "builder", name: "Builder", title: "Infrastructure", icon: I.HardHat, color: "#10b981" },
      { key: "closer", name: "Closer", title: "Negotiator", icon: I.Handshake, color: "#FFD700" },
      { key: "treasurer", name: "Treasurer", title: "Risk Manager", icon: I.PiggyBank, color: "#f59e0b" },
    ];

    function WarRoom() {
      const [wallet, setWallet] = useState(null);
      const [address, setAddress] = useState("");
      const [balance, setBalance] = useState("0");
      const [tick, setTick] = useState(0);
      const [logs, setLogs] = useState([]);
      const [running, setRunning] = useState(false);
      const [directive, setDirective] = useState("");
      const [resources, setResources] = useState({ energy: 100, compute: 20, data: 2.5 });

      const connectWallet = async () => {
        if (!window.ethereum) {
          alert("Install MetaMask to play Aether-War on-chain");
          return;
        }
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const signer = await provider.getSigner();
        const addr = await signer.getAddress();
        const bal = await provider.getBalance(addr);
        setWallet(signer);
        setAddress(addr);
        setBalance(ethers.formatEther(bal).slice(0, 6));
        addLog("SYSTEM", `Wallet connected: ${addr.slice(0,6)}...${addr.slice(-4)} — ${ethers.formatEther(bal).slice(0,6)} ETH`);
        
        // Listen for account changes
        window.ethereum.on("accountsChanged", () => setWallet(null));
      };

      const addLog = (agent, text) => {
        const t = tick + 1;
        setLogs(prev => [`[T+${t}] [${agent}] ${text}`, ...prev].slice(0, 50));
      };

      const processTick = async () => {
        setRunning(true);
        setTick(t => t + 1);
        const t = tick + 1;

        // If wallet connected, execute real transactions
        if (wallet) {
          try {
            // Scout: read on-chain state
            addLog("SCOUT", `Scanning Sector Grid on-chain... Block #${t}. Detecting unclaimed sectors.`);

            // Builder: claim a sector (simulated transaction)
            // In production, this would call PhysicsEngine.claimSector()
            const dummyTx = {
              to: "0x0000000000000000000000000000000000000000",
              value: ethers.parseEther("0.001"),
            };
            // await wallet.sendTransaction(dummyTx); // Real tx — uncomment for real
            addLog("BUILDER", `Transaction prepared: claim sector #${12 + t} — gas estimated at 0.001 ETH. Ready to sign.`);
            setResources(r => ({ energy: r.energy + 12, compute: r.compute - 3, data: r.data + 0.2 }));

            // Closer
            addLog("CLOSER", `Market scan complete. ${r.resources?.compute > 15 ? 'Excess Compute detected — creating SELL intent.' : 'Balanced portfolio. Holding.'}`);
            
            // Treasurer
            addLog("TREASURER", `Vault review: ${(r.resources?.energy * 1 + r.resources?.compute * 10 + r.resources?.data * 100).toFixed(0)} value. Decay applied.`);
          } catch(e) {
            addLog("ERROR", `Transaction failed: ${e.message?.slice(0, 80)}`);
          }
        } else {
          // Simulation mode
          const actions = [
            ["SCOUT", `Scanning Sector Grid... Sector 47 detected — yield E:15 C:2.5 D:0.15. Unclaimed. 🔓 Connect wallet to claim.`],
            ["BUILDER", `Infrastructure check — 3 sectors owned. Sector 12 upgrade eligible. Cost: 30 Compute.`],
            ["CLOSER", `Market analysis — E:${resources.energy.toFixed(0)} C:${resources.compute.toFixed(0)} D:${resources.data.toFixed(2)}. ${resources.compute > 15 ? 'Sell signal.' : 'Hold.'}`],
            ["TREASURER", `Vault total: ${(resources.energy + resources.compute * 10 + resources.data * 100).toFixed(0)} value. Decay rate: 1%.`],
          ];
          actions.forEach(([a, t]) => addLog(a, t));
          setResources(r => ({ energy: r.energy + 5, compute: r.compute + 1, data: r.data + 0.1 }));
        }

        setTimeout(() => setRunning(false), 1500);
      };

      useEffect(() => {
        const interval = setInterval(processTick, 10000);
        return () => clearInterval(interval);
      }, [wallet, tick]);

      return (
        <div style={{ minHeight:"100vh", padding:24, background:"linear-gradient(180deg, #0A0E14 0%, #111827 100%)" }}>
          {/* Header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24, flexWrap:"wrap", gap:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:44, height:44, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05))", border:"1px solid rgba(255,215,0,0.2)", color:"#FFD700" }}>{I.Cpu()}</div>
              <div>
                <h1 style={{ fontSize:24, fontWeight:800, color:"#fff", letterSpacing:-1 }}>Aether-War</h1>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <I.Circle color={wallet ? "#22c55e" : "#f59e0b"} />
                  <span style={{ fontSize:11, color: wallet ? "#22c55e" : "#f59e0b" }}>
                    {wallet ? `LIVE — ${address.slice(0,6)}...${address.slice(-4)} · ${balance} ETH` : "SIMULATION — Connect wallet for real on-chain play"}
                  </span>
                </div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              {!wallet ? (
                <button onClick={connectWallet} className="gold-btn" style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {I.Wallet()} Connect Wallet
                </button>
              ) : (
                <div className="card" style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 14px" }}>
                  <I.Circle color="#22c55e" />
                  <span style={{ fontSize:11, color:"#fff" }}>{balance} ETH</span>
                </div>
              )}
              <button onClick={processTick} disabled={running} className="gold-btn" style={{ display:"flex", alignItems:"center", gap:8 }}>
                {I.Play()} {running ? "Processing..." : `Tick #${tick}`}
              </button>
            </div>
          </div>

          {/* Directive Console */}
          <div className="card" style={{ marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              {I.Cpu()}
              <h3 style={{ fontSize:12, fontWeight:700, color:"#fff", textTransform:"uppercase", letterSpacing:1 }}>Directive Console</h3>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={directive} onChange={e => setDirective(e.target.value)} placeholder='e.g., "Prioritize Compute acquisition" or "Claim 3 new sectors"' />
              <button onClick={() => { if(directive) { addLog("DIRECTIVE", `Mandate set: "${directive}"`); setDirective(""); }}} className="gold-btn" style={{ whiteSpace:"nowrap" }}>
                Execute
              </button>
            </div>
          </div>

          {/* Agent Cards */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))", gap:12, marginBottom:24 }}>
            {AGENTS.map((agent, i) => {
              const latestLog = logs.find(l => l.includes(`[${agent.key.toUpperCase()}]`));
              return (
                <div key={agent.key} className="card">
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <div style={{ width:32, height:32, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", background:`${agent.color}15`, color:agent.color }}>
                      <agent.icon />
                    </div>
                    <div>
                      <h3 style={{ fontSize:12, fontWeight:700, color:"#fff" }}>{agent.name}</h3>
                      <p style={{ fontSize:9, color:"#64748b" }}>{agent.title}</p>
                    </div>
                  </div>
                  {latestLog && (
                    <p style={{ fontSize:10, color:"#cbd5e1", lineHeight:1.5 }}>
                      {latestLog.split("] ").slice(2).join("] ") || "Awaiting..."}
                    </p>
                  )}
                </div>
              );
            })}
          </div>

          {/* Live Telemetry */}
          <div className="card" style={{ background:"rgba(10,14,20,0.95)" }}>
            <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.04)", display:"flex", alignItems:"center", gap:8 }}>
              {I.Activity()}
              <h3 style={{ fontSize:12, fontWeight:700, color:"#fff", textTransform:"uppercase", letterSpacing:1 }}>Live Telemetry</h3>
              <span style={{ marginLeft:"auto", fontSize:10, color:"#475569" }}>{logs.length} events</span>
            </div>
            <div style={{ padding:16, fontFamily:"'JetBrains Mono', monospace", fontSize:10, lineHeight:2, maxHeight:400, overflowY:"auto", background:"rgba(0,0,0,0.3)" }}>
              {logs.length === 0 ? (
                <p style={{ color:"#475569" }}>No telemetry yet. Connect your wallet and process a tick to deploy your swarm on-chain.</p>
              ) : logs.map((line, i) => {
                const isDirective = line.includes("[DIRECTIVE]");
                const isError = line.includes("[ERROR]");
                return (
                  <div key={i} style={{ color: isError ? "#fca5a5" : isDirective ? "#FFD700" : "#cbd5e1" }}>
                    {line}
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ textAlign:"center", padding:"32px 0 0", fontSize:10, color:"#475569", lineHeight:1.8 }}>
            Aether-War v0.2 · DeFAI Autonomous World · ERC-6551/7521 · Physics Engine ECS · Agentic Loop Live<br/>
            {wallet ? "🔗 Connected to Ethereum Mainnet via MetaMask — real transactions ready" : "⚡ Connect MetaMask to play on-chain. Simulation mode active."}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WarRoom />);
  </script>
</body>
</html>
